version: '3.9'

services:
  api:
    build:
      context: ../..               
      dockerfile: deployment/api/Dockerfile
    ports:
      - "3000:3000"
    env_file:                     
      - ../../.env 
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ../../data:/app/data       

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example123
      MONGO_INITDB_DATABASE: blogdb
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: